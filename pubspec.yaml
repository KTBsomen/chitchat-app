name: chitchat
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.4

dependencies:
  cached_network_image: ^3.4.1
  firebase_messaging: ^15.1.0
  flutter:
    sdk: flutter
  flutter_staggered_grid_view: ^0.7.0
  google_sign_in: ^6.2.2
  image_picker: ^1.1.2
  shared_preferences: ^2.3.3
  story_view: ^0.16.5
  google_mlkit_face_detection: ^0.12.0
  image: ^4.3.0
  dio: ^5.7.0
  page_transition: ^2.1.0
  youtube_player_flutter: ^9.1.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
  

  fonts:
    - family: PassionOne
      fonts:
        - asset: assets/fonts/Passion_One/PassionOne-Regular.ttf
        - asset: assets/fonts/Passion_One/PassionOne-Bold.ttf
          weight: 700

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins/Poppins-Italic.ttf
          style: italic
